name: 'Test aux4 Package'
description: 'Run tests for an aux4 package before publishing'
author: 'aux4'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  working_directory:
    description: 'Working directory containing the repository'
    required: false
    default: '.'
  package_directory:
    description: 'Directory containing the package .aux4 file'
    required: false
    default: 'package'
  test_directory:
    description: 'Directory containing the test files'
    required: false
    default: 'test'
  system_packages:
    description: 'Space-separated list of system packages to install (apt/brew)'
    required: false
    default: ''
  npm_packages:
    description: 'Space-separated list of global npm packages to install'
    required: false
    default: ''
  packages:
    description: 'Space-separated list of aux4 packages to install'
    required: false
    default: ''
  build_command:
    description: 'Command to build the package before testing (e.g., aux4 builder linux)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install aux4
      shell: bash
      run: |
        curl -fsSL https://aux4.sh | sh
        echo "$HOME/.aux4.config/packages/aux4/aux4" >> $GITHUB_PATH

    - name: Install pkger
      shell: bash
      run: |
        curl -fsSL https://pkger.aux4.sh | sh

    - name: Install system packages
      shell: bash
      run: |
        if [ -z "${{ inputs.system_packages }}" ]; then
          echo "No system packages to install"
          exit 0
        fi

        for pkg in ${{ inputs.system_packages }}; do
          echo "Installing system package: $pkg"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y "$pkg"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install "$pkg"
          else
            echo "::warning::Unsupported OS for system packages: $RUNNER_OS"
          fi
        done

    - name: Install npm packages
      shell: bash
      run: |
        if [ -z "${{ inputs.npm_packages }}" ]; then
          echo "No npm packages to install"
          exit 0
        fi

        for pkg in ${{ inputs.npm_packages }}; do
          echo "Installing npm package: $pkg"
          npm i -g "$pkg"
        done

    - name: Install aux4 packages
      shell: bash
      run: |
        if [ -z "${{ inputs.packages }}" ]; then
          echo "No aux4 packages to install"
          exit 0
        fi

        for pkg in ${{ inputs.packages }}; do
          echo "Installing aux4 package: $pkg"
          aux4 aux4 pkger install "$pkg"
        done

    - name: Install jest
      shell: bash
      run: |
        npm i -g jest

    - name: Install aux4 test
      shell: bash
      run: |
        aux4 aux4 pkger install aux4/test

    - name: Build package
      if: ${{ inputs.build_command != '' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "Building: ${{ inputs.build_command }}"
        ${{ inputs.build_command }}

    - name: Package and install
      shell: bash
      working-directory: ${{ inputs.working_directory }}/${{ inputs.package_directory }}
      run: |
        if [ ! -f ".aux4" ]; then
          echo "::error::Package metadata not found at .aux4"
          exit 1
        fi

        SCOPE=$(jq -r '.scope' ".aux4")
        NAME=$(jq -r '.name' ".aux4")
        VERSION=$(jq -r '.version' ".aux4")

        echo "Packaging ${SCOPE}/${NAME}@${VERSION}"
        aux4 aux4 pkger build .

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          i686|i386) ARCH="386" ;;
        esac

        PLATFORM_FILE="${OS}_${ARCH}_${SCOPE}_${NAME}_${VERSION}.zip"
        PACKAGE_FILE="${SCOPE}_${NAME}_${VERSION}.zip"

        if [ -f "$PLATFORM_FILE" ]; then
          echo "Installing platform package from ${PLATFORM_FILE}"
          aux4 aux4 pkger install --fromFile "$PLATFORM_FILE"
        elif [ -f "$PACKAGE_FILE" ]; then
          echo "Installing package from ${PACKAGE_FILE}"
          aux4 aux4 pkger install --fromFile "$PACKAGE_FILE"
        else
          echo "::error::Package file not found: ${PLATFORM_FILE} or ${PACKAGE_FILE}"
          exit 1
        fi

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working_directory }}/${{ inputs.package_directory }}/${{ inputs.test_directory }}
      run: |
        echo "Running tests..."
        aux4 test run
